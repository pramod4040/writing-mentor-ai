services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

  api:
    build:
      context: .
      dockerfile: apps/api/docker/Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017/writer-mentor-ai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - mongo
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/docker/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  mongo_data:
